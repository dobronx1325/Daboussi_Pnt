name: Deploy Lean Blueprint to GitHub Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 必须的权限配置
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码（递归拉取所有子模块，包括 mathlib）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2. 安装 Elan（关键修复：把路径同时加到当前 shell 和 GITHUB_PATH）
      - name: Install Elan
        run: |
          # 安装 Elan
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          # 把 Elan 路径加到当前 shell 的 PATH（立即生效）
          export PATH="$HOME/.elan/bin:$PATH"
          # 同时加到 GITHUB_PATH（给后续步骤用）
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
          # 验证安装（当前 shell 就能找到 elan 了）
          elan --version

      # 3. 配置 Lean 工具链（从项目的 lean-toolchain 读取）
      - name: Setup Lean toolchain
        run: |
          # 读取版本号
          LEAN_VERSION=$(cat lean-toolchain)
          echo "Lean 版本：$LEAN_VERSION"
          # 安装并设为默认
          elan install $LEAN_VERSION
          elan default $LEAN_VERSION
          # 验证工具链
          lean --version
          lake --version

      # 4. 拉取所有依赖（解决 mathlib 找不到的问题）
      - name: Update lake dependencies
        run: lake update

      # 5. 拉取 mathlib 预编译缓存（避免重新编译，节省大量时间）
      - name: Get mathlib cache
        run: lake exe cache get

      # 6. 构建项目 + 蓝图文档
      - name: Build project and blueprint
        run: |
          lake build
          lake build blueprint

      # 7. 准备 Pages 部署文件
      - name: Prepare pages artifact
        run: |
          mkdir -p _site
          # 把蓝图生成的文档复制到 _site（Pages 从这里部署）
          cp -r ./build/doc/* ./_site/

      # 8. 上传部署产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      # 9. 部署到 GitHub Pages
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
