name: Deploy Lean Blueprint to GitHub Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装系统级依赖（解决pygraphviz编译失败）
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz libgraphviz-dev build-essential

      # 3. 安装Elan和Lean工具链
      - name: Install Elan & Lean
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          export PATH="$HOME/.elan/bin:$PATH"
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
          LEAN_VERSION=$(cat lean-toolchain)
          elan install $LEAN_VERSION
          elan default $LEAN_VERSION
          lean --version
          lake --version

      # 4. 拉取mathlib依赖并构建Lean项目
      - name: Build Lean project
        run: |
          lake update
          lake exe cache get
          lake build

      # 5. 安装Python和leanblueprint命令行工具
      - name: Set up Python & leanblueprint
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install leanblueprint
        run: pip install leanblueprint

      # 6. 安装LaTeX（生成PDF需要）
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full

      # ========== 关键修复：正确的蓝图构建命令 ==========
      - name: Build blueprint
        run: |

          leanblueprint web

      # 7. 准备Pages部署文件
      - name: Prepare pages artifact
        run: |
          mkdir -p _site
          # 蓝图生成的网页固定在 blueprint/web 文件夹里
          cp -r ./blueprint/web/* ./_site/

      # 8. 上传并部署到GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
