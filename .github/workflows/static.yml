name: Deploy Lean Blueprint to GitHub Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Elan 和 Lean 工具链（必须！）
      - name: Install Elan & Lean
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          export PATH="$HOME/.elan/bin:$PATH"
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
          # 安装项目指定的 Lean 版本
          LEAN_VERSION=$(cat lean-toolchain)
          elan install $LEAN_VERSION
          elan default $LEAN_VERSION
          lean --version
          lake --version

      # 3. 拉取 mathlib 依赖（必须！）
      - name: Fetch mathlib
        run: |
          lake update
          lake exe cache get

      # 4. 安装 Python 和 leanblueprint 命令行工具
      - name: Set up Python & leanblueprint
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install leanblueprint
        run: pip install leanblueprint

      # 5. 安装 LaTeX（生成 PDF 需要）
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full

      # 6. 构建 Lean 项目（让 leanblueprint 能找到编译后的 .olean 文件）
      - name: Build Lean project
        run: lake build

      # 7. 关键：用 leanblueprint 命令构建蓝图
      - name: Build blueprint
        run: |
          cd blueprint
          leanblueprint build

      # 8. 准备 Pages 部署文件
      - name: Prepare pages artifact
        run: |
          mkdir -p _site
          cp -r ./blueprint/web/* ./_site/

      # 9. 上传并部署
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
